<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-light-blue: #00A3FF;
            /* Intensified Section Background - More 'Blue' */
            --section-bg: rgba(0, 163, 255, 0.08);
            /* Standard Glassy Header (35% Transparent) */
            --header-bg: rgba(255, 255, 255, 0.35); 
        }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
        
        .glass-nav { background: var(--header-bg); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .section-card { 
            background: var(--section-bg); 
            border: 1px solid rgba(0, 163, 255, 0.15); 
            border-radius: 2rem;
            padding: 1.5rem;
        }
        .animate-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white min-h-screen text-slate-800 pb-12">

    <nav class="sticky top-0 z-50 w-full glass-nav">
        <div class="max-w-4xl mx-auto px-4 py-3 grid grid-cols-3 items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#00A3FF] rounded-lg flex items-center justify-center text-white font-black shadow-lg shadow-blue-100 text-sm">W</div>
                <h1 class="font-bold tracking-tight text-sm hidden sm:block uppercase italic text-[#00A3FF]">WorkPulse</h1>
            </div>
            <div id="current-date" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] text-center whitespace-nowrap">--:--:--</div>
            <div class="flex items-center justify-end gap-1">
                <button id="reset-btn" disabled class="p-2 text-slate-300 hover:text-red-400 transition-all disabled:opacity-30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
                <button id="export-btn" disabled class="p-2 bg-slate-100 text-slate-300 rounded-full transition-all disabled:opacity-30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-xl mx-auto px-4 space-y-10 pt-10">
        
        <section class="section-card">
            <h2 class="font-extrabold text-xs uppercase tracking-widest text-[#00A3FF] mb-6 text-center">Shift Duration</h2>
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase text-center">Clock In</label>
                    <input type="time" id="in-time" class="w-full bg-white/70 border border-blue-100 rounded-2xl p-4 font-bold text-lg outline-none focus:border-[#00A3FF] transition-all text-center">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase text-center">Clock Out</label>
                    <input type="time" id="out-time" class="w-full bg-white/70 border border-blue-100 rounded-2xl p-4 font-bold text-lg outline-none focus:border-[#00A3FF] transition-all text-center">
                </div>
            </div>
        </section>

        <section class="section-card space-y-4">
            <h2 class="font-extrabold text-xs uppercase tracking-widest text-[#00A3FF] text-center">Breaks</h2>
            
            <div class="grid grid-cols-[1fr_1fr_1fr_40px] gap-4 px-4">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter text-center">Start Time</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter text-center">End Time</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter text-center">Total</span>
                <span></span>
            </div>

            <div id="breaks-container" class="space-y-3"></div>

            <div class="flex justify-center pt-2">
                <button id="add-break-btn" class="bg-white border border-blue-100 p-2.5 rounded-2xl shadow-sm hover:shadow-blue-100 active:scale-90 transition-all text-[#00A3FF]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"/></svg>
                </button>
            </div>
        </section>

        <section class="section-card space-y-6">
            <h2 class="font-extrabold text-xs uppercase tracking-widest text-[#00A3FF] text-center">Duration Calculation</h2>
            <div class="flex items-center justify-between gap-2">
                <div class="flex-1 bg-white/80 p-4 rounded-3xl text-center border border-blue-50">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Gross</p>
                    <p id="gross-output" class="font-bold text-slate-700 text-sm">0h 0m</p>
                </div>
                <div class="text-blue-200 font-black text-xl">−</div>
                <div class="flex-1 bg-white/80 p-4 rounded-3xl text-center border border-blue-50">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Breaks</p>
                    <p id="total-break-display" class="font-bold text-[#00A3FF] text-sm">0m</p>
                </div>
                <div class="text-blue-200 font-black text-xl">=</div>
                <div id="net-card-container" class="flex-1 bg-[#00A3FF] p-4 rounded-3xl text-center shadow-lg shadow-blue-100 transition-all duration-300">
                    <p class="text-[9px] font-black text-white/70 uppercase mb-1">Net Work</p>
                    <p id="net-output" class="font-bold text-white text-sm">0h 0m</p>
                </div>
            </div>
            <p id="error-output" class="text-red-400 text-[10px] font-bold text-center uppercase tracking-widest min-h-[1.25rem]"></p>
        </section>
    </main>

    <script src="logic.js"></script>
    <script src="controller.js"></script>
</body>
</html>
