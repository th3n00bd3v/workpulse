<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .container-box { transition: all 0.3s ease; }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 sm:p-8 flex flex-col items-center justify-center">

    <div class="container-box flex flex-col w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-200 overflow-hidden">
        
        <header class="bg-white p-5 border-b border-gray-100 text-center">
            <h2 class="text-xl sm:text-2xl font-black text-gray-800 tracking-tight">⏱️ Work Calculator</h2>
        </header>

        <main class="flex flex-col p-4 sm:p-6 gap-5">
            
            <section class="flex flex-col gap-3 bg-blue-50 border border-blue-100 p-4 sm:p-5 rounded-2xl">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-blue-500">Work Period</h3>
                <div class="flex flex-col sm:flex-row items-center gap-2">
                    <div class="w-full flex flex-col gap-1">
                        <span class="text-[9px] font-bold text-blue-400 ml-1 uppercase text-center sm:text-left">In</span>
                        <input type="time" id="in-time" class="w-full p-2.5 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-center sm:text-left">
                    </div>
                    <span class="hidden sm:block mt-5 text-blue-200 font-black text-xs">TO</span>
                    <div class="w-full flex flex-col gap-1">
                        <span class="text-[9px] font-bold text-blue-400 ml-1 uppercase text-center sm:text-left">Out</span>
                        <input type="time" id="out-time" class="w-full p-2.5 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold text-center sm:text-left">
                    </div>
                </div>
                <div id="work-duration" class="bg-blue-600 text-white p-3 rounded-xl font-bold text-xs sm:text-sm text-center shadow-md">
                    Gross Duration: 0m
                </div>
            </section>

            <section class="flex flex-col gap-4 border border-gray-100 p-4 sm:p-5 rounded-2xl bg-gray-50/50">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Breaks</h3>
                    <button id="add-break-btn" class="bg-gray-800 hover:bg-black text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-lg transition-all active:scale-95">+</button>
                </div>
                <div id="breaks-container" class="flex flex-col gap-2"></div>
                <div id="total-break-duration" class="text-gray-400 font-bold text-[9px] uppercase tracking-widest text-right px-1">
                    Total Break: 0m
                </div>
            </section>

            <section id="net-duration-section" class="hidden flex flex-col gap-3 bg-green-50 border border-green-200 p-4 sm:p-5 rounded-2xl">
                <div id="net-duration" class="bg-green-600 text-white p-4 rounded-xl font-black text-center text-lg sm:text-xl shadow-lg border-b-4 border-green-800">
                    Net: 0m
                </div>
                <p id="validation-message" class="text-red-600 text-[10px] font-black text-center uppercase tracking-widest"></p>
            </section>
        </main>

        <footer class="p-4 sm:p-6 bg-gray-50 border-t border-gray-100 flex gap-3">
            <button id="reset-btn" disabled class="flex-grow py-3 bg-white border border-gray-300 text-gray-400 hover:text-red-500 hover:border-red-200 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all active:bg-red-50">
                Reset
            </button>
            <button id="export-btn" disabled class="flex-grow py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all shadow-md active:scale-95">
                Export
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
